# This is a conceptual GitHub Actions workflow for a Push-based K8s deployment.
# It assumes you have a Dockerfile and a 'k8s/deployment.yaml' file in your repo.

name: Deploy to Kubernetes

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Registry
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)
          docker build -t my-app:$IMAGE_TAG .
          docker tag my-app:$IMAGE_TAG my-registry/my-app:$IMAGE_TAG
          docker push my-registry/my-app:$IMAGE_TAG
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Set up Kubeconfig
        uses: azure/k8s-set-context@v3
        with:
          method: kubeconfig
          kubeconfig: ${{ secrets.KUBE_CONFIG }}

      - name: Deploy to Kubernetes
        run: |
          # Use 'sed' to update the image tag in the manifest file
          sed -i "s|image: my-registry/my-app:.*|image: my-registry/my-app:${{ env.IMAGE_TAG }}|g" k8s/deployment.yaml
          
          kubectl apply -f k8s/deployment.yaml
          
          # Wait for the rollout to complete
          kubectl rollout status deployment/my-app-deployment
