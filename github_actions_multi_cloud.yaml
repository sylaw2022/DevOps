# Example: GitHub Actions for Multi-Cloud (AWS and GCP)
# This shows how the authentication steps differ between providers.

name: Multi-Cloud Deploy

on:
  push:
    branches: [ "main" ]

jobs:
  # Example 1: Deploying to AWS EKS
  deploy-aws:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push (AWS)
        run: |
          docker build -t ${{ steps.login-ecr.outputs.registry }}/my-app:${{ github.sha }} .
          docker push ${{ steps.login-ecr.outputs.registry }}/my-app:${{ github.sha }}

      - name: Update Kubeconfig (AWS EKS)
        run: aws eks update-kubeconfig --name my-eks-cluster

      - name: Deploy to EKS
        run: kubectl apply -f k8s/deployment.yaml

  # Example 2: Deploying to Google GKE
  deploy-gcp:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: 'auth'
        uses: 'google-github-actions/auth@v2'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@v2'

      - name: 'Configure Docker for Artifact Registry'
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build & Push (GCP)
        run: |
          docker build -t us-central1-docker.pkg.dev/my-project/my-repo/my-app:${{ github.sha }} .
          docker push us-central1-docker.pkg.dev/my-project/my-repo/my-app:${{ github.sha }}

      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: my-gke-cluster
          location: us-central1

      - name: Deploy to GKE
        run: kubectl apply -f k8s/deployment.yaml
